# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  PUBLISH_FOLDER: ./ASP/ASPReact/ASPReact.Server/publish

jobs:
# Please do not rename this job
  build-project:
    name: build Bachelors-Dissertation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create dev certificate for Vite HTTPS config
        # vite.config.ts reads cert files at load time (even during build),
        # so the certificate must exist before npm run build is invoked.
        run: |
          $certFolder = "$env:APPDATA/ASP.NET/https"
          New-Item -ItemType Directory -Force -Path $certFolder
          dotnet dev-certs https --export-path "$certFolder/aspreact.client.pem" --format Pem --no-password

      - name: Install client dependencies
        working-directory: ./ASP/ASPReact/aspreact.client
        run: npm ci

      - name: Build React client
        # esproj has ShouldRunBuildScript=false so the client must be built manually.
        # Output lands in aspreact.client/dist/ and is picked up by dotnet publish.
        working-directory: ./ASP/ASPReact/aspreact.client
        run: npm run build

      - name: Publish .NET application as self-contained Windows executable
        working-directory: ./ASP/ASPReact/ASPReact.Server
        run: dotnet publish -c Release -r win-x64 --self-contained true -o ./publish

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-eu.ionos.space
          project-id: 344ec7f2-64f3-40a0-857c-2f2851e5b54d
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.PUBLISH_FOLDER }}
          config-file: .deploy-now/Bachelors-Dissertation/config.yaml
          action: upload
